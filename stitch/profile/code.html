<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-highest": "#dfdbe8",
                    "inverse-surface": "#0e0d14",
                    "primary-fixed": "#ae8dff",
                    "on-background": "#2f2e35",
                    "secondary-fixed-dim": "#fdabd7",
                    "tertiary-fixed-dim": "#85b7ee",
                    "surface-container": "#ebe6f2",
                    "inverse-on-surface": "#9f9ba4",
                    "on-primary-container": "#2b006e",
                    "tertiary": "#275e90",
                    "outline": "#78757e",
                    "secondary-fixed": "#ffbfe0",
                    "background": "#faf5ff",
                    "on-secondary-fixed-variant": "#7a3b61",
                    "on-error-container": "#510017",
                    "surface": "#faf5ff",
                    "surface-dim": "#d7d2e0",
                    "on-primary-fixed-variant": "#370086",
                    "surface-container-low": "#f4effa",
                    "secondary-dim": "#793a60",
                    "on-tertiary-fixed": "#002949",
                    "on-primary": "#f8f0ff",
                    "error-dim": "#a70138",
                    "error": "#b41340",
                    "primary-container": "#ae8dff",
                    "error-container": "#f74b6d",
                    "inverse-primary": "#a078ff",
                    "surface-container-high": "#e5e0ed",
                    "on-tertiary-container": "#003f6a",
                    "surface-bright": "#faf5ff",
                    "surface-tint": "#6a37d4",
                    "tertiary-container": "#93c5fd",
                    "on-secondary-fixed": "#581e43",
                    "on-primary-fixed": "#000000",
                    "tertiary-dim": "#165284",
                    "surface-container-lowest": "#ffffff",
                    "primary": "#6a37d4",
                    "surface-variant": "#dfdbe8",
                    "secondary-container": "#ffbfe0",
                    "outline-variant": "#afabb5",
                    "secondary": "#87456c",
                    "on-error": "#ffefef",
                    "on-secondary": "#ffeef4",
                    "primary-fixed-dim": "#a27cff",
                    "on-tertiary": "#ecf3ff",
                    "on-surface": "#2f2e35",
                    "on-secondary-container": "#6f3257",
                    "tertiary-fixed": "#93c5fd",
                    "primary-dim": "#5e26c7",
                    "on-tertiary-fixed-variant": "#004878",
                    "on-surface-variant": "#5d5a62"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans", "PingFang SC"],
                    "body": ["Be Vietnam Pro"],
                    "label": ["Be Vietnam Pro"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Be Vietnam Pro', 'PingFang SC', sans-serif; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', 'PingFang SC', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#FAF5FF]/70 dark:bg-[#1A1625]/70 backdrop-blur-md shadow-[0_12px_40px_rgba(106,55,212,0.08)]">
<div class="flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-2 active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-[#8B5CF6] dark:text-[#AE8DFF]">arrow_back</span>
</div>
<h1 class="text-[#2F2E35] dark:text-[#F4EFFA] font-bold text-lg tracking-wide font-headline">个人中心</h1>
<div class="w-6"></div> <!-- Spacer for balance -->
</div>
</header>
<main class="pt-24 px-6 space-y-8">
<!-- User Header Section -->
<section class="flex flex-col items-center text-center space-y-4">
<div class="relative group">
<div class="absolute -inset-1 bg-gradient-to-r from-[#8B5CF6] to-[#AE8DFF] rounded-full blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
<div class="relative w-24 h-24 rounded-full border-4 border-[#8B5CF6] p-1 bg-surface-container-lowest">
<img class="w-full h-full rounded-full object-cover" data-alt="close-up portrait of a whimsical young woman with soft features and lavender tinted hair, editorial high-fashion photography style, soft focus background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCwyxTmUErMVoe5nnKyJ4qzlQEN4HhSf8y3-4WlCTS6FHJJB0vge9t8TexPUD-adE_c7Hu-oErTds4pt9yaNVhB8Y6TfrHmO9UyfEcgWnSt-JfkJq7vUAqi6IAxhtl1jdwGfxyGnxDkOCLuT8iSw2WpQGzxUBDJj11Utl3V7aCJEw-Z4P_qKDJNR-VvFZsuvrY468duLLcopXQp4UZVW717WeNaVQnkHKRM1a8gjYrIg3i3SxA1OtLiu6KON2m9rO8ixeT_2DkKqUE"/>
</div>
<div class="absolute bottom-0 right-0 bg-[#8B5CF6] text-white p-1 rounded-full shadow-lg">
<span class="material-symbols-outlined text-xs" style="font-variation-settings: 'FILL' 1;">edit</span>
</div>
</div>
<div class="space-y-1">
<h2 class="text-2xl font-extrabold text-on-background tracking-tight">莉莉丝 <span class="text-sm align-middle">✨</span></h2>
<p class="text-on-surface-variant font-medium opacity-70">ID: 88921</p>
</div>
</section>
<!-- Shipping Info Card (Bento Style) -->
<section class="bg-surface-container-lowest rounded-lg p-6 shadow-[0_12px_40px_rgba(106,55,212,0.04)] space-y-6 relative overflow-hidden">
<div class="absolute top-0 right-0 p-4 opacity-10">
<span class="material-symbols-outlined text-4xl">local_pharmacy</span>
</div>
<div class="space-y-4">
<div class="space-y-2">
<label class="text-secondary font-semibold text-sm px-1">收货姓名</label>
<input class="w-full bg-surface-container-low border-none rounded-md px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary-fixed transition-all outline-none" placeholder="请输入姓名" type="text" value="莉莉丝"/>
</div>
<div class="space-y-2">
<label class="text-secondary font-semibold text-sm px-1">手机号码</label>
<input class="w-full bg-surface-container-low border-none rounded-md px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary-fixed transition-all outline-none" placeholder="请输入手机号" type="tel" value="138 **** 8888"/>
</div>
<div class="space-y-2">
<label class="text-secondary font-semibold text-sm px-1">收货地址</label>
<textarea class="w-full bg-surface-container-low border-none rounded-md px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary-fixed transition-all outline-none resize-none h-24" placeholder="请输入详细地址">幻梦境薰衣草田路 7 号 魔女小屋</textarea>
</div>
</div>
<button class="w-full bg-gradient-to-r from-[#6A37D4] to-[#AE8DFF] text-white font-bold py-4 rounded-full shadow-lg shadow-[#6A37D4]/20 active:scale-[0.98] transition-transform duration-200">
                保存
            </button>
</section>
<!-- Quick Links List -->
<section class="space-y-3">
<a class="flex items-center justify-between p-5 bg-surface-container-low rounded-lg hover:bg-surface-container transition-colors group" href="#">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-primary-container/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">package_2</span>
</div>
<span class="font-semibold text-on-surface">我的订单</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform">chevron_right</span>
</a>
<a class="flex items-center justify-between p-5 bg-surface-container-low rounded-lg hover:bg-surface-container transition-colors group" href="#">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-secondary-container/30 flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">shopping_bag</span>
</div>
<span class="font-semibold text-on-surface">继续购物</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform">chevron_right</span>
</a>
</section>
<!-- Danger Zone -->
<section class="pt-4 pb-8 flex justify-center">
<button class="text-error-dim font-semibold flex items-center gap-2 hover:opacity-70 transition-opacity">
<span class="material-symbols-outlined text-sm">logout</span>
                退出登录
            </button>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-[#FAF5FF]/70 dark:bg-[#1A1625]/70 backdrop-blur-md rounded-t-[2.5rem] border-t border-white/20 shadow-[0_-8px_30px_rgba(106,55,212,0.1)]">
<div class="flex justify-around items-center px-4 pt-3 pb-8 w-full">
<!-- Home -->
<div class="flex flex-col items-center justify-center text-[#87456C] dark:text-[#DFDBE8] opacity-60 hover:opacity-100 transition-opacity active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined">home</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold">首页</span>
</div>
<!-- Cart -->
<div class="flex flex-col items-center justify-center text-[#87456C] dark:text-[#DFDBE8] opacity-60 hover:opacity-100 transition-opacity active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined">shopping_cart</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold">购物车</span>
</div>
<!-- Profile (Active) -->
<div class="flex flex-col items-center justify-center bg-gradient-to-r from-[#6A37D4] to-[#AE8DFF] text-white rounded-full px-5 py-1.5 shadow-lg shadow-[#6A37D4]/30 active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold">个人中心</span>
</div>
</div>
</nav>
</body></html>
