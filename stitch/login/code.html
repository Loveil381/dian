<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>魔女小店 - 登录</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Be+Vietnam+Pro:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-fixed": "#000000",
                    "primary-fixed": "#ae8dff",
                    "on-background": "#2f2e35",
                    "on-tertiary": "#ecf3ff",
                    "surface-container-lowest": "#ffffff",
                    "secondary-container": "#ffbfe0",
                    "on-tertiary-fixed": "#002949",
                    "background": "#faf5ff",
                    "outline-variant": "#afabb5",
                    "surface-container-high": "#e5e0ed",
                    "tertiary": "#275e90",
                    "secondary-fixed-dim": "#fdabd7",
                    "primary": "#6a37d4",
                    "tertiary-dim": "#165284",
                    "surface": "#faf5ff",
                    "primary-fixed-dim": "#a27cff",
                    "error-container": "#f74b6d",
                    "surface-tint": "#6a37d4",
                    "on-secondary-container": "#6f3257",
                    "secondary-fixed": "#ffbfe0",
                    "on-error": "#ffefef",
                    "on-error-container": "#510017",
                    "surface-dim": "#d7d2e0",
                    "error-dim": "#a70138",
                    "outline": "#78757e",
                    "on-tertiary-container": "#003f6a",
                    "on-surface": "#2f2e35",
                    "on-primary-fixed-variant": "#370086",
                    "secondary-dim": "#793a60",
                    "primary-container": "#ae8dff",
                    "inverse-surface": "#0e0d14",
                    "inverse-on-surface": "#9f9ba4",
                    "on-surface-variant": "#5d5a62",
                    "on-tertiary-fixed-variant": "#004878",
                    "inverse-primary": "#a078ff",
                    "surface-container": "#ebe6f2",
                    "on-primary-container": "#2b006e",
                    "surface-bright": "#faf5ff",
                    "tertiary-container": "#93c5fd",
                    "surface-container-low": "#f4effa",
                    "tertiary-fixed-dim": "#85b7ee",
                    "surface-variant": "#dfdbe8",
                    "on-secondary-fixed": "#581e43",
                    "primary-dim": "#5e26c7",
                    "error": "#b41340",
                    "surface-container-highest": "#dfdbe8",
                    "secondary": "#87456c",
                    "on-secondary-fixed-variant": "#7a3b61",
                    "on-primary": "#f8f0ff",
                    "tertiary-fixed": "#93c5fd",
                    "on-secondary": "#ffeef4"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans", "PingFang SC", "sans-serif"],
                    "body": ["Be Vietnam Pro", "PingFang SC", "sans-serif"],
                    "label": ["Be Vietnam Pro", "PingFang SC", "sans-serif"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-background min-h-screen flex flex-col items-center justify-center p-6 selection:bg-primary-container selection:text-on-primary-container">
<!-- Brand Shell Suppression: TopAppBar and BottomNavBar are excluded for this transactional page -->
<main class="w-full max-w-md space-y-12 flex flex-col items-center">
<!-- Header Section -->
<div class="flex flex-col items-center space-y-6 text-center">
<div class="relative w-24 h-24 flex items-center justify-center bg-surface-container-low rounded-full">
<div class="absolute inset-0 bg-gradient-to-tr from-primary-container/20 to-secondary-container/20 blur-xl rounded-full"></div>
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<div class="absolute -top-1 -right-1">
<span class="text-2xl">✨</span>
</div>
</div>
<div class="space-y-2">
<h1 class="font-headline text-3xl font-bold tracking-tight text-on-surface">欢迎回来</h1>
<p class="text-secondary font-medium opacity-80">进入魔女的愈合工坊</p>
</div>
</div>
<!-- Auth Toggle -->
<div class="flex p-1.5 bg-surface-container-high rounded-full w-full max-w-[280px]">
<button class="flex-1 py-2.5 rounded-full text-sm font-semibold bg-primary text-on-primary shadow-sm transition-all duration-200">
                登录
            </button>
<button class="flex-1 py-2.5 rounded-full text-sm font-semibold text-on-surface-variant hover:text-primary transition-all duration-200">
                注册
            </button>
</div>
<!-- Login Form -->
<div class="w-full space-y-6">
<div class="space-y-4">
<div class="group">
<label class="block px-4 pb-2 text-xs font-bold tracking-widest text-secondary uppercase">账号名称</label>
<div class="relative">
<input class="w-full px-6 py-4 bg-surface-container-lowest border-none rounded-[1.5rem] focus:ring-2 focus:ring-primary-fixed ring-offset-2 transition-all placeholder:text-outline-variant/60 text-on-surface" placeholder="输入您的灵感名" type="text"/>
<span class="absolute right-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline-variant group-focus-within:text-primary transition-colors">person</span>
</div>
</div>
<div class="group">
<label class="block px-4 pb-2 text-xs font-bold tracking-widest text-secondary uppercase">秘密咒语</label>
<div class="relative">
<input class="w-full px-6 py-4 bg-surface-container-lowest border-none rounded-[1.5rem] focus:ring-2 focus:ring-primary-fixed ring-offset-2 transition-all placeholder:text-outline-variant/60 text-on-surface" placeholder="••••••••" type="password"/>
<span class="absolute right-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline-variant group-focus-within:text-primary transition-colors">lock</span>
</div>
</div>
</div>
<div class="flex justify-between items-center px-2">
<label class="flex items-center space-x-2 cursor-pointer group">
<div class="w-5 h-5 rounded-md bg-surface-container-highest flex items-center justify-center transition-colors group-hover:bg-primary-container">
<span class="material-symbols-outlined text-xs text-white" style="font-variation-settings: 'wght' 700;">check</span>
</div>
<span class="text-sm text-on-surface-variant font-medium">记住我</span>
</label>
<a class="text-sm font-semibold text-primary hover:opacity-80 transition-opacity" href="#">忘记密码？</a>
</div>
<button class="w-full py-4 px-6 bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold rounded-full shadow-[0_12px_40px_rgba(106,55,212,0.15)] hover:scale-[1.02] active:scale-[0.98] transition-all duration-200">
                立即登录
            </button>
</div>
<!-- Footer Links -->
<div class="flex flex-col items-center space-y-4">
<p class="text-on-surface-variant text-sm font-medium">
                还没有账号？ 
                <a class="text-secondary font-bold hover:underline underline-offset-4 ml-1" href="#">点击注册</a>
</p>
<!-- Visual Break -->
<div class="flex items-center space-x-4 w-full">
<div class="h-[1px] flex-1 bg-gradient-to-r from-transparent via-outline-variant/20 to-transparent"></div>
<span class="text-[10px] uppercase tracking-widest text-outline-variant font-bold">or connect with</span>
<div class="h-[1px] flex-1 bg-gradient-to-r from-transparent via-outline-variant/20 to-transparent"></div>
</div>
<div class="flex space-x-6">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-lowest text-primary shadow-sm hover:shadow-md transition-all">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
</button>
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-lowest text-primary shadow-sm hover:shadow-md transition-all">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">cloud</span>
</button>
</div>
</div>
</main>
<!-- Bottom Privacy Note -->
<footer class="mt-auto py-8">
<p class="text-[12px] text-outline flex items-center font-medium">
            我们尊重并保护你的隐私 <span class="material-symbols-outlined text-[14px] ml-1">lock</span>
</p>
</footer>
<!-- Decorative Elements (The "Witch's Touch") -->
<div class="fixed top-20 -left-20 w-64 h-64 bg-primary-container/10 blur-[100px] rounded-full -z-10"></div>
<div class="fixed bottom-20 -right-20 w-64 h-64 bg-secondary-container/10 blur-[100px] rounded-full -z-10"></div>
</body></html>
