<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Be Vietnam Pro', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        .headline-font {
            font-family: 'Plus Jakarta Sans', 'PingFang SC', sans-serif;
        }
        .glass-effect {
            background: rgba(250, 245, 255, 0.7);
            backdrop-filter: blur(20px);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#85b7ee",
                        "on-tertiary": "#ecf3ff",
                        "on-secondary-container": "#6f3257",
                        "surface-bright": "#faf5ff",
                        "on-primary": "#f8f0ff",
                        "inverse-surface": "#0e0d14",
                        "primary": "#6a37d4",
                        "surface-dim": "#d7d2e0",
                        "on-tertiary-fixed-variant": "#004878",
                        "on-secondary-fixed-variant": "#7a3b61",
                        "surface-container-high": "#e5e0ed",
                        "on-secondary-fixed": "#581e43",
                        "on-primary-fixed": "#000000",
                        "secondary": "#87456c",
                        "inverse-primary": "#a078ff",
                        "outline": "#78757e",
                        "primary-container": "#ae8dff",
                        "on-surface-variant": "#5d5a62",
                        "error-dim": "#a70138",
                        "surface-container-low": "#f4effa",
                        "tertiary": "#275e90",
                        "surface-container-highest": "#dfdbe8",
                        "surface-tint": "#6a37d4",
                        "error-container": "#f74b6d",
                        "primary-fixed": "#ae8dff",
                        "error": "#b41340",
                        "secondary-fixed": "#ffbfe0",
                        "outline-variant": "#afabb5",
                        "surface": "#faf5ff",
                        "tertiary-dim": "#165284",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed-dim": "#fdabd7",
                        "on-error": "#ffefef",
                        "surface-variant": "#dfdbe8",
                        "secondary-dim": "#793a60",
                        "on-primary-container": "#2b006e",
                        "secondary-container": "#ffbfe0",
                        "inverse-on-surface": "#9f9ba4",
                        "on-primary-fixed-variant": "#370086",
                        "surface-container": "#ebe6f2",
                        "primary-fixed-dim": "#a27cff",
                        "on-secondary": "#ffeef4",
                        "primary-dim": "#5e26c7",
                        "background": "#faf5ff",
                        "on-tertiary-fixed": "#002949",
                        "on-surface": "#2f2e35",
                        "on-error-container": "#510017",
                        "on-background": "#2f2e35",
                        "tertiary-container": "#93c5fd",
                        "on-tertiary-container": "#003f6a",
                        "tertiary-fixed": "#93c5fd"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#f6f7fb] min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
<!-- Background Decoration: Subtle Alchemist Glows -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-container/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary-container/10 rounded-full blur-[120px]"></div>
<!-- Login Shell Container -->
<main class="w-full max-w-[350px] relative z-10">
<!-- Brand Logo / Identity Above Card -->
<div class="flex flex-col items-center mb-8">
<div class="w-16 h-16 bg-gradient-to-br from-primary to-primary-container rounded-full flex items-center justify-center mb-4 shadow-[0_8px_20px_rgba(106,55,212,0.2)]">
<span class="material-symbols-outlined text-white text-3xl" data-weight="fill">auto_fix_high</span>
</div>
<h1 class="headline-font text-2xl font-bold text-on-surface tracking-tight">魔女小店</h1>
<p class="text-on-surface-variant text-sm mt-1">系统管理中心</p>
</div>
<!-- Main Login Card -->
<div class="bg-surface-container-lowest p-8 rounded-[12px] shadow-[0_12px_40px_rgba(106,55,212,0.08)] border border-outline-variant/10">
<div class="text-center mb-6">
<h2 class="text-on-surface font-bold text-lg">后台登录</h2>
</div>
<!-- Alerts Container (Demonstration of States) -->
<div class="space-y-3 mb-6">
<!-- Success Alert -->
<div class="flex items-center gap-3 p-3 bg-emerald-50 text-emerald-700 rounded-lg text-xs border border-emerald-100">
<span class="material-symbols-outlined text-sm">check_circle</span>
<p>管理员账号创建成功，请登录。</p>
</div>
<!-- Error Alert -->
<div class="flex items-center gap-3 p-3 bg-error-container/10 text-error rounded-lg text-xs border border-error-container/20">
<span class="material-symbols-outlined text-sm">error</span>
<p>用户名或密码错误，请重试。</p>
</div>
<!-- Lockout Alert -->
<div class="flex items-center gap-3 p-3 bg-amber-50 text-amber-700 rounded-lg text-xs border border-amber-100">
<span class="material-symbols-outlined text-sm">lock_clock</span>
<p>登录尝试过多，请 15 分钟后再试。</p>
</div>
</div>
<!-- Login Form -->
<form action="#" class="space-y-4" method="POST">
<div>
<label class="sr-only" for="username">用户名</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-sm">person</span>
<input class="w-full pl-11 pr-4 py-3 bg-surface-container-low border-transparent focus:border-primary-fixed focus:ring-0 rounded-[12px] text-sm text-on-surface transition-all placeholder:text-outline-variant" id="username" name="username" placeholder="用户名" type="text"/>
</div>
</div>
<div>
<label class="sr-only" for="password">密码</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-sm">lock</span>
<input class="w-full pl-11 pr-4 py-3 bg-surface-container-low border-transparent focus:border-primary-fixed focus:ring-0 rounded-[12px] text-sm text-on-surface transition-all placeholder:text-outline-variant" id="password" name="password" placeholder="密码" type="password"/>
</div>
</div>
<button class="w-full py-3 bg-[#7c3aed] hover:bg-primary transition-all rounded-[12px] text-white font-medium text-sm shadow-lg shadow-primary/20 active:scale-[0.98]" type="submit">
                    登录
                </button>
</form>
</div>
<!-- Footer / Technical Note -->
<div class="mt-8 text-center">
<p class="text-xs text-outline-variant tracking-wider flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xs">shield</span>
                安全受控的管理环境
            </p>
</div>
</main>
<!-- Shared Component: Footer -->
<footer class="fixed bottom-4 w-full flex justify-center items-center gap-8 w-full">
<span class="text-xs font-plus-jakarta-sans opacity-60 text-violet-400">© 2024 魔女小店 后台管理系统</span>
<div class="flex gap-4">
<a class="text-xs font-plus-jakarta-sans opacity-60 text-slate-400 hover:text-violet-500 transition-colors" href="#">安全条例</a>
<a class="text-xs font-plus-jakarta-sans opacity-60 text-slate-400 hover:text-violet-500 transition-colors" href="#">联系支持</a>
</div>
</footer>
<!-- Decorative Corner Element -->
<div class="fixed top-8 right-8 pointer-events-none opacity-20">
<span class="material-symbols-outlined text-primary text-6xl rotate-12">auto_fix_high</span>
</div>
</body></html>
