<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Be+Vietnam+Pro:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-fixed": "#000000",
                    "primary-fixed": "#ae8dff",
                    "on-background": "#2f2e35",
                    "on-tertiary": "#ecf3ff",
                    "surface-container-lowest": "#ffffff",
                    "secondary-container": "#ffbfe0",
                    "on-tertiary-fixed": "#002949",
                    "background": "#faf5ff",
                    "outline-variant": "#afabb5",
                    "surface-container-high": "#e5e0ed",
                    "tertiary": "#275e90",
                    "secondary-fixed-dim": "#fdabd7",
                    "primary": "#6a37d4",
                    "tertiary-dim": "#165284",
                    "surface": "#faf5ff",
                    "primary-fixed-dim": "#a27cff",
                    "error-container": "#f74b6d",
                    "surface-tint": "#6a37d4",
                    "on-secondary-container": "#6f3257",
                    "secondary-fixed": "#ffbfe0",
                    "on-error": "#ffefef",
                    "on-error-container": "#510017",
                    "surface-dim": "#d7d2e0",
                    "error-dim": "#a70138",
                    "outline": "#78757e",
                    "on-tertiary-container": "#003f6a",
                    "on-surface": "#2f2e35",
                    "on-primary-fixed-variant": "#370086",
                    "secondary-dim": "#793a60",
                    "primary-container": "#ae8dff",
                    "inverse-surface": "#0e0d14",
                    "inverse-on-surface": "#9f9ba4",
                    "on-surface-variant": "#5d5a62",
                    "on-tertiary-fixed-variant": "#004878",
                    "inverse-primary": "#a078ff",
                    "surface-container": "#ebe6f2",
                    "on-primary-container": "#2b006e",
                    "surface-bright": "#faf5ff",
                    "tertiary-container": "#93c5fd",
                    "surface-container-low": "#f4effa",
                    "tertiary-fixed-dim": "#85b7ee",
                    "surface-variant": "#dfdbe8",
                    "on-secondary-fixed": "#581e43",
                    "primary-dim": "#5e26c7",
                    "error": "#b41340",
                    "surface-container-highest": "#dfdbe8",
                    "secondary": "#87456c",
                    "on-secondary-fixed-variant": "#7a3b61",
                    "on-primary": "#f8f0ff",
                    "tertiary-fixed": "#93c5fd",
                    "on-secondary": "#ffeef4"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": [
                            "Plus Jakarta Sans", "PingFang SC", "sans-serif"
                    ],
                    "body": [
                            "Be Vietnam Pro", "PingFang SC", "sans-serif"
                    ],
                    "label": [
                            "Be Vietnam Pro", "PingFang SC", "sans-serif"
                    ]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Be Vietnam Pro', 'PingFang SC', sans-serif;
            background-color: #FAF5FF;
        }
        .glass-effect {
            background: rgba(250, 245, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(174, 141, 255, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center">
<!-- Top Navigation Suppressed for Transactional Flow as per rules -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 py-4 bg-purple-50/70 dark:bg-slate-900/70 backdrop-blur-md">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-purple-700" data-icon="auto_awesome">auto_awesome</span>
<span class="text-lg font-bold text-purple-800 tracking-wide font-headline">The Ethereal Apothecary</span>
</div>
<button class="text-purple-400 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</header>
<main class="flex-1 w-full max-w-md px-6 pt-32 pb-12 flex flex-col items-center">
<!-- Hero Section -->
<div class="w-24 h-24 mb-8 relative">
<div class="absolute inset-0 bg-primary-container opacity-20 rounded-full blur-2xl"></div>
<img alt="Brand Logo" class="relative z-10 w-full h-full object-cover rounded-full" data-alt="High-end minimalist illustration of a stylized witch hat with lavender flowers in a Japanese zakka cosmetic style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBWiArgapU8mO5EKUrfL3Z-uf-MJYzTRYUuzXvyuO7OlLFnWTLy6bG1oqBM-CRqFwa2CT_zsYM_aOSQSsK7Ca0KQ12yZDAZqUiXHq0s-JETo2e76CinGZ077yYm_MobECueMZEiWfTIIYBf2T7USTsxGsJqJRS4uir1sn5RmBbrBifPbT9s3221Lq3nmCv1f5QjECu-B8zdMwP_53N8PIT8HM5UY4OFI8IZTCG9fKE38zf5gHlokPO_m_pLglu6POLqBxqSIRVfMlk"/>
<div class="absolute -top-1 -right-1 bg-surface-container-lowest p-1.5 rounded-full shadow-sm">
<span class="text-sm">✨</span>
</div>
</div>
<h1 class="text-3xl font-headline font-extrabold text-on-surface mb-8 tracking-tight">欢迎加入</h1>
<!-- Auth Tabs -->
<div class="flex p-1.5 bg-surface-container-low rounded-full mb-10 w-full">
<a class="flex-1 py-3 text-center text-sm font-semibold text-outline rounded-full transition-all duration-200" href="#">登录</a>
<a class="flex-1 py-3 text-center text-sm font-semibold bg-primary text-on-primary rounded-full shadow-lg shadow-primary/20" href="#">注册</a>
</div>
<!-- Registration Form -->
<form class="w-full space-y-5">
<div class="space-y-1.5">
<label class="text-xs font-semibold text-secondary ml-4 uppercase tracking-widest">用户名</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant text-lg" data-icon="person">person</span>
<input class="w-full pl-12 pr-6 py-4 bg-surface-container-highest border-none rounded-[1.5rem] placeholder:text-outline-variant focus:bg-surface-container-lowest transition-all text-on-surface" placeholder="设置你的独特昵称" type="text"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-semibold text-secondary ml-4 uppercase tracking-widest">电子邮箱</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant text-lg" data-icon="mail">mail</span>
<input class="w-full pl-12 pr-6 py-4 bg-surface-container-highest border-none rounded-[1.5rem] placeholder:text-outline-variant focus:bg-surface-container-lowest transition-all text-on-surface" placeholder="hello@example.com" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-semibold text-secondary ml-4 uppercase tracking-widest">设置密码</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant text-lg" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-highest border-none rounded-[1.5rem] placeholder:text-outline-variant focus:bg-surface-container-lowest transition-all text-on-surface" placeholder="至少8位字符" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-semibold text-secondary ml-4 uppercase tracking-widest">确认密码</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant text-lg" data-icon="verified_user">verified_user</span>
<input class="w-full pl-12 pr-6 py-4 bg-surface-container-highest border-none rounded-[1.5rem] placeholder:text-outline-variant focus:bg-surface-container-lowest transition-all text-on-surface" placeholder="再次输入以确认" type="password"/>
</div>
</div>
<div class="pt-4">
<button class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold rounded-full shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all duration-200" type="submit">
                    注册
                </button>
</div>
</form>
<!-- Footer Links -->
<div class="mt-8 text-center space-y-4">
<p class="text-on-surface-variant text-sm">
                已有账号？<a class="text-primary font-semibold ml-1" href="#">点击登录</a>
</p>
<div class="pt-6 flex flex-col items-center gap-3">
<div class="flex items-center gap-2 px-4 py-2 bg-surface-container-low rounded-full">
<span class="text-xs text-on-surface-variant">我们尊重并保护你的隐私 🔒</span>
</div>
<p class="text-[10px] text-outline px-8 leading-relaxed">
                    注册即代表你已阅读并同意 <a class="underline" href="#">服务协议</a> 与 <a class="underline" href="#">隐私政策</a>
</p>
</div>
</div>
</main>
<!-- Bottom Aesthetic Decoration (Apothecary Drawer vibe) -->
<div class="w-full overflow-hidden h-32 relative pointer-events-none opacity-40">
<div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-[120%] h-64 bg-primary-container/20 rounded-[100%] blur-3xl"></div>
</div>
<!-- Decorative floating elements -->
<div class="fixed top-24 -left-12 w-32 h-32 bg-secondary-container/30 rounded-full blur-3xl"></div>
<div class="fixed bottom-32 -right-12 w-40 h-40 bg-tertiary-container/20 rounded-full blur-3xl"></div>
</body></html>
